if(t==='full'){ti='Full Flash - '+CE;bo='Hi Team,\n\nSharing the latest CCS flash update for '+CE+'.\n\n';var preCF=getCF('preArt'),preGL=preCF.filter(function(b){return b.preArt.setup==='Shell Complete'&&b.preArt.tagging==='Completed'}).length;if(preGL===preCF.length&&preCF.length>0)bo+='Pre-ART: All brands secured for go-live.\n\n';else bo+='Pre-ART: '+preGL+'/'+preCF.length+' go-live secured.\n\n';bo+='Pre-ART Snapshot\n'+catTable('preArt',true)+'\n\nART Snapshot\n'+catTable('art',true)+'\n\nThanks,\nKind regards,\n'+U+'\n'}
else if(t==='exec'){ti='Executive Summary - '+CE;var preCF2=getCF('preArt'),artCF=getCF('art');var preGL2=preCF2.filter(function(b){return b.preArt.setup==='Shell Complete'&&b.preArt.tagging==='Completed'}).length;var artSrc=artCF.filter(function(b){return b.art.sourcing==='Completed'}).length;var artDone=artCF.filter(function(b){return b.art.setup==='Shell Complete'}).length;var artGL=artCF.filter(function(b){return b.art.setup==='Shell Complete'&&b.art.tagging==='Completed'}).length;bo='Hi Team,\n\n'+CE+' | Executive Summary | '+td+'\n\nPre-ART: '+preCF2.length+' confirmed | Go-live: '+preGL2+'/'+preCF2.length+' ('+(preCF2.length?Math.round(preGL2/preCF2.length*100):0)+'%)\nART: '+artCF.length+' confirmed | Sourced: '+artSrc+' | Setups: '+artDone+' | Go-live: '+artGL+'/'+artCF.length+'\n\nThanks,\nKind regards,\n'+U+'\n'}
else{ti='Risk Report - '+CE;bo='Hi Team,\n\n'+CE+' | Risk Report | '+td+'\n\n';['preArt','art'].forEach(function(wf2){var label=wf2==='preArt'?'PRE-ART':'ART';var cf2=getCF(wf2);var dy=dU(wf2==='preArt'?e.preArtDate:e.artDate);bo+=label+' (Go-live: '+(wf2==='preArt'?e.preArtDate:e.artDate)+')\n';var any=false;cf2.forEach(function(b){var w=b[wf2];if(w.tagging!=='Completed'&&dy<=3){bo+='  [CRITICAL] '+b.brand+' ('+b.poc+') - Not tagged, '+dy+'d to go\n';any=true}else if(w.sourcing==='Pending'&&w.followup>=2){bo+='  [HIGH] '+b.brand+' ('+b.poc+') - Sourcing pending, '+w.followup+' F/Us\n';any=true}else if(w.setup==='Not Raised'&&w.sourcing==='Completed'){bo+='  [MEDIUM] '+b.brand+' ('+b.poc+') - Sourced but no setup\n';any=true}});br.filter(function(b){return b[wf2].participation==='Pending Confirmation'}).forEach(function(b){bo+='  [LOW] '+b.brand+' ('+b.poc+') - Not confirmed\n';any=true});if(!any)bo+='  No risks.\n';bo+='\n'});bo+='Thanks,\nKind regards,\n'+U+'\n'}
document.getElementById('RT').textContent=ti;document.getElementById('RB2').textContent=bo;document.getElementById('RO').classList.remove('hid')}
